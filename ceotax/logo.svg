<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 160" width="620" height="160">
  <defs>
    <!-- ── GRADIENTS ── -->

    <!-- Arc: radial gradient for cylindrical 3D depth -->
    <radialGradient id="gArc" cx="38%" cy="38%" r="65%"
                    gradientUnits="userSpaceOnUse"
                    fx="55" fy="42">
      <stop offset="0%"   stop-color="#2e5ca8"/>
      <stop offset="45%"  stop-color="#1c3f7c"/>
      <stop offset="100%" stop-color="#112a56"/>
    </radialGradient>

    <!-- Bars: vertical gradient warm orange -->
    <linearGradient id="gBar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f8b040"/>
      <stop offset="100%" stop-color="#d06610"/>
    </linearGradient>
    <linearGradient id="gBar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f9b545"/>
      <stop offset="100%" stop-color="#d46c12"/>
    </linearGradient>
    <linearGradient id="gBar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fabb4a"/>
      <stop offset="100%" stop-color="#d87215"/>
    </linearGradient>

    <!-- Arrow gradient -->
    <linearGradient id="gArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a3868"/>
      <stop offset="100%" stop-color="#264e96"/>
    </linearGradient>

    <!-- Arrowhead fill -->
    <linearGradient id="gHead" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1c3d78"/>
      <stop offset="100%" stop-color="#112a56"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!--                   ICON                      -->
  <!--  Circle center: (78, 76)   radius: 54       -->
  <!--  Stroke-width: 14 → outer r≈61, inner r≈47  -->
  <!-- ═══════════════════════════════════════════ -->

  <!--
    Gap at upper-right: from 340° to 70° (clockwise through 0°), = 90° gap.
    70°  → x=78+54·cos70°=78+18.47=96.47, y=76+54·sin70°=76+50.73=126.73 → (96,127)
    340° → x=78+54·cos340°=78+50.73=128.73, y=76+54·sin340°=76-18.47=57.53 → (129,58)

    Arc: M 96 127 A 54 54 0 1 1 129 58   (clockwise, large-arc)
  -->

  <!-- ── FILLED ARC PATH (outer r=61, inner r=47) for gradient depth ── -->
  <!--
    Outer 70°:  (78+66·cos70°, 76+66·sin70°) = (78+22.58,76+62.01) = (100.58, 138.01)
    Outer 340°: (78+66·cos340°, 76+66·sin340°) = (78+62.01,76-22.58) = (140.01, 53.42)
    Inner 70°:  (78+42·cos70°, 76+42·sin70°) = (78+14.37,76+39.47) = (92.37, 115.47)
    Inner 340°: (78+42·cos340°, 76+42·sin340°) = (78+39.47,76-14.37) = (117.47, 61.63)
  -->
  <path d="
    M 101 138
    A 66 66 0 1 1 140 53
    L 117 62
    A 42 42 0 1 0 92 115
    Z"
    fill="url(#gArc)"/>

  <!-- Inner highlight arc (thin, lighter blue, creates bevel/shine effect) -->
  <path d="M 92 115 A 42 42 0 1 1 117 62"
        fill="none"
        stroke="#3a6cbf"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.55"/>

  <!-- ── BAR CHART (3 ascending bars, inside lower portion of circle) ── -->
  <!--
    Bottom baseline: y=122
    Bar width: 14px, gap: 4px
    Total group width: 3*14+2*4 = 50px → center at x=78 → left start = 78-25 = 53
    Bar 1 x=53: height 24 → top y=98
    Bar 2 x=71: height 38 → top y=84
    Bar 3 x=89: height 54 → top y=68
    Contained inside inner radius 42 from center (78,76).
  -->
  <rect x="53" y="98"  width="14" height="24" rx="3" fill="url(#gBar1)"/>
  <rect x="71" y="84"  width="14" height="38" rx="3" fill="url(#gBar2)"/>
  <rect x="89" y="68"  width="14" height="54" rx="3" fill="url(#gBar3)"/>

  <!-- ── ARROW: diagonal pointing NE, tip at (129,30) ── -->
  <!--
    Local: right-pointing line + arrowhead, then rotate(-45) and translate to tip.
    Shaft: x1=-50 y1=0 → x2=-8 y2=0
    Tip at (136, 22) — upper-right, above circle.
    After rotate(-45) and translate(136,22):
      (-50,0) → (-35.4, 35.4) → (100.6, 57.4) ← inside circle ✓
  -->
  <g transform="translate(136,22) rotate(-45)">
    <line x1="-50" y1="0" x2="-8" y2="0"
          stroke="url(#gArrow)" stroke-width="8.5" stroke-linecap="round"/>
    <polygon points="5,0  -12,-9.5  -12,9.5" fill="url(#gHead)"/>
  </g>

  <!-- Arrow highlight (thin, lighter) -->
  <g transform="translate(136,22) rotate(-45)">
    <line x1="-50" y1="-2" x2="-8" y2="-2"
          stroke="#4a7ccf" stroke-width="2"
          stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!--                   TEXT                      -->
  <!-- ═══════════════════════════════════════════ -->

  <!--
    Icon right edge: 78+66+1 = 145 → text starts at 162 (17px gap)
    "ceotax" at font-size 72, baseline ≈ y=105
  -->

  <!-- "ceo" navy + "tax" orange -->
  <text x="162" y="105"
        font-family="'Montserrat','Arial Black',Arial,sans-serif"
        font-weight="800"
        font-size="72"
        letter-spacing="-1.5">
    <tspan fill="#1c3d7a">ceo</tspan><tspan fill="#e88e18">tax</tspan>
  </text>

  <!-- Subtitle: CONSULTORIA TRIBUTARIA -->
  <text x="164" y="128"
        font-family="'Montserrat',Arial,sans-serif"
        font-weight="500"
        font-size="14.5"
        fill="#8a97a8"
        letter-spacing="4">CONSULTORIA TRIBUTARIA</text>

</svg>
