<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Ceotax – Logo Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { margin: 0; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; font-family: sans-serif; }
    .card { background: white; border-radius: 16px; padding: 40px 60px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); display: flex; align-items: center; justify-content: center; }
    .card.dark { background: #1b3c72; }
    label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .group { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
  <div class="group">
    <label>Fundo Branco</label>
    <div class="card">
      <img src="logo.svg" width="460" height="120" alt="Ceotax Logo"/>
    </div>
  </div>
  <div class="group">
    <label>Fundo Escuro</label>
    <div class="card dark">
      <img src="logo.svg" width="460" height="120" alt="Ceotax Logo"/>
    </div>
  </div>
  <div class="group">
    <label>SVG Inline (escalável)</label>
    <div class="card" style="padding: 20px 40px;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 130" width="700" height="182">
        <path d="M 76 87 A 38 38 0 1 1 85 39" fill="none" stroke="#1b3c72" stroke-width="11" stroke-linecap="round"/>
        <rect x="31" y="69" width="9" height="19" rx="2" fill="#e27c18"/>
        <rect x="44" y="58" width="9" height="30" rx="2" fill="#e27c18"/>
        <rect x="57" y="47" width="9" height="41" rx="2" fill="#e27c18"/>
        <g transform="translate(89,21) rotate(-45)">
          <line x1="-32" y1="0" x2="-5" y2="0" stroke="#1b3c72" stroke-width="5.5" stroke-linecap="round"/>
          <polygon points="2,0 -9,-6.5 -9,6.5" fill="#1b3c72"/>
        </g>
        <text x="113" y="89" font-family="Montserrat,'Arial Black',Arial,sans-serif" font-weight="800" font-size="56" letter-spacing="-1">
          <tspan fill="#1b3c72">ceo</tspan><tspan fill="#e27c18">tax</tspan>
        </text>
        <text x="115" y="109" font-family="Montserrat,Arial,sans-serif" font-weight="500" font-size="13" fill="#8a97a8" letter-spacing="3">CONSULTORIA TRIBUTARIA</text>
      </svg>
    </div>
  </div>
</body>
</html>
