<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 50px; display: flex; justify-content: center; align-items: center; background-color: #222; }
        .arte-container {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #ff6a00 0%, #ee0979 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .text-cidade { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 5.8rem; 
            line-height: 1.05; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 1.5rem; 
            text-shadow: 5px 5px 0px rgba(0,0,0,0.15); 
        }
        .text-regiao { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 4rem; 
            font-weight: 800; 
            color: #FFE600; 
            text-shadow: 3px 3px 0px rgba(0,0,0,0.15); 
            margin-bottom: 2rem; 
        }
        .condicoes-wrapper {
            background: white; 
            border-radius: 9999px; 
            padding: 1.2rem 3.5rem; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2), 0 10px 10px -5px rgba(0,0,0,0.1);
            transform: rotate(-2deg);
            display: inline-block;
            margin-top: 1rem;
        }
        .text-condicoes { 
            font-size: 3.2rem; 
            font-weight: 800; 
            color: #ee0979; 
            text-transform: uppercase;
        }
        .logo { 
            position: absolute; 
            bottom: 50px; 
            height: 140px; 
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
            background: rgba(255,255,255,0.95);
            padding: 15px 30px;
            border-radius: 30px;
        }
        .pattern { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            opacity: 0.1; 
            background-image: radial-gradient(white 3px, transparent 3px); 
            background-size: 50px 50px; 
            pointer-events: none; 
        }
        .alerta {
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 2rem;
            border-radius: 9999px;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="arte-container" id="arte">
        <div class="pattern"></div>
        <div style="z-index: 10; margin-top: -120px; display: flex; flex-direction: column; align-items: center;">
            <div class="alerta">ATENÇÃO</div>
            <h1 class="text-cidade">Alô Cachoeiras<br>de Macacu - RJ</h1>
            <h2 class="text-regiao">E Região, Estamos chegando!</h2>
            <div class="condicoes-wrapper">
                <span class="text-condicoes">Com condições especiais para você!</span>
            </div>
        </div>
        <img src="logo-idea-solucoes-transp.png" alt="Idea Soluções" class="logo">
    </div>
</body>
</html>
