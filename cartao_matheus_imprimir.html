<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cartão de Visita - Gerador Premium</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        premium: {
                            dark: '#111111',
                            gold: '#d4af37',
                            orange: '#f37521',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Configurações rigorosas para Impressão e Tamanho */
        :root {
            --card-width: 90mm;
            --card-height: 50mm;
            --bleed: 3mm;
        }
        
        body {
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .instruction-bar {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-container {
            width: calc(var(--card-width) + (var(--bleed) * 2));
            height: calc(var(--card-height) + (var(--bleed) * 2));
            background: white;
            position: relative;
            box-sizing: border-box;
            border: 1px dashed #ccc;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .card-content {
            width: var(--card-width);
            height: var(--card-height);
            position: absolute;
            top: var(--bleed);
            left: var(--bleed);
            overflow: hidden;
            padding: 5mm; 
        }

        .bg-front {
            background: #111111;
            color: #ffffff;
        }
        
        .bg-back {
            background: #111111;
            color: #ffffff;
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            body {
                background: white !important;
                padding: 10mm;
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important;
                display: block;
            }
            .instruction-bar {
                display: none !important;
            }
            .card-container {
                box-shadow: none !important;
                border: 0.5px solid #eaeaea;
                float: left;
                margin-right: 10mm;
                margin-bottom: 10mm;
                page-break-inside: avoid;
            }
            /* Remove a bordinha extra branca no fundo da tela, para gráfica imprimir as sangrias perfeitas */
        }
    </style>
</head>
<body>

    <!-- Ferramenta de Upload Local -->
    <div class="instruction-bar print:hidden">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Configure Suas Imagens</h2>
        <p class="text-sm text-gray-600 mb-4">
            Como estamos diretamente no seu navegador, **carregue as suas imagens aqui clicando nos botões abaixo**. Elas aparecerão magicamente na arte pronta para imprimir.
        </p>

        <div class="flex flex-wrap gap-4 mb-4">
            <!-- Botão 1 -->
            <label class="cursor-pointer bg-orange-100 hover:bg-orange-200 text-orange-800 font-semibold py-2 px-4 rounded border border-orange-300 shadow-sm transition">
                <span><i class="fas fa-upload mr-1"></i> Subir Logo Idea Food (Laranja)</span>
                <input type="file" class="hidden" accept="image/*" onchange="previewImage(event, 'img-idea')">
            </label>

            <!-- Botão 2 -->
            <label class="cursor-pointer bg-blue-100 hover:bg-blue-200 text-blue-800 font-semibold py-2 px-4 rounded border border-blue-300 shadow-sm transition">
                <span><i class="fas fa-upload mr-1"></i> Subir Logo Grupo Idea (Azul)</span>
                <input type="file" class="hidden" accept="image/*" onchange="previewImage(event, 'img-grupo-idea')">
            </label>

            <!-- Botão 3 -->
            <label class="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-2 px-4 rounded border border-gray-300 shadow-sm transition">
                <span><i class="fas fa-upload mr-1"></i> Subir QR Code Original</span>
                <input type="file" class="hidden" accept="image/*" onchange="previewImage(event, 'img-qrcode')">
            </label>
        </div>

        <div class="mb-4 bg-gray-50 border border-gray-200 p-3 rounded-md flex flex-col md:flex-row gap-4">
            <div class="w-full">
                <label class="block text-[10px] font-semibold text-gray-700 uppercase tracking-widest mb-2"><i class="fas fa-arrows-alt-v mr-1"></i> Subir / Descer Logo (Eixo Y):</label>
                <input type="range" id="range-pos-y" min="-100" max="100" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
            </div>
            
            <div class="w-full">
                <label class="block text-[10px] font-semibold text-gray-700 uppercase tracking-widest mb-2"><i class="fas fa-arrows-alt-h mr-1"></i> Esquerda / Direita (Eixo X):</label>
                <input type="range" id="range-pos-x" min="-100" max="100" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>

        <button onclick="window.print()" class="w-full bg-premium-orange text-white px-6 py-3 rounded-lg font-bold shadow-lg hover:bg-orange-600 transition-colors text-lg">
            <i class="fas fa-print mr-2"></i> Imprimir / Gerar PDF de Alta Qualidade
        </button>
    </div>

    <!-- FRENTE DO CARTÃO -->
    <div class="card-container bg-front relative">

        <div class="card-content flex items-center justify-center w-full h-full relative z-10">
            <!-- Logo principal Idea (Ajuste ótico para cima para não pesar na base) -->
            <img id="img-idea" src="https://placehold.co/300x150/ffffff/f37521?text=Suba+Logo+Idea" alt="Idea Logo" class="w-48 h-auto object-contain mb-4">
        </div>
    </div>

    <!-- VERSO DO CARTÃO -->
    <div class="card-container bg-back relative">
        <!-- Faixa Esquerda Ouro/Laranja -->
        <div class="absolute left-0 top-0 w-2 h-full bg-premium-orange"></div>
        <!-- Faixa Direita Ouro/Laranja -->
        <div class="absolute right-0 top-0 w-2 h-full bg-premium-orange"></div>

        <div class="card-content flex flex-row items-center justify-between pl-8 pr-6">
            
            <!-- Dados de Contato e Logo Grupo Idea -->
            <div class="flex flex-col justify-center text-left w-[65%] h-full">
                <h2 class="font-serif text-[13pt] font-bold text-white uppercase tracking-wide mt-2">Matheus Jardim</h2>
                <p class="text-[7pt] font-semibold text-premium-orange uppercase tracking-widest mb-4">Desenvolvimento & Sistemas</p>

                <div class="flex items-center gap-2 mb-1.5">
                    <i class="fab fa-whatsapp text-[8pt] text-premium-orange w-3 text-center"></i>
                    <span class="text-[7.5pt] font-medium text-white/90">(22) 99810-2575</span>
                </div>
                
                <div class="flex items-center gap-2 mb-1.5">
                    <i class="fas fa-globe text-[8pt] text-premium-orange w-3 text-center"></i>
                    <span class="text-[7.5pt] font-medium text-white/90">ideasistema.online</span>
                </div>
                
                <!-- Espaçador para empurrar a logo pra baixo -->
                <div class="flex-grow"></div>

                <!-- Logo do Grupo Idea Embaixo -->
                <div class="pb-2 mt-auto flex items-center justify-start w-full opacity-90">
                    <img id="img-grupo-idea-back" src="https://placehold.co/200x50/ffffff/0ea5e9?text=Suba+Sua+Logo+IA" alt="Grupo Idea IA" class="h-24 w-auto object-contain object-left -ml-4 -mt-2 invert brightness-0">
                </div>
            </div>

            <!-- QR Code Area (Aumentado) -->
            <div class="flex flex-col items-center justify-center w-[30%]">
                <div class="bg-white p-2 rounded-sm shadow-sm mb-1">
                    <img id="img-qrcode" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://ideasistema.online" alt="QR Code" class="w-20 h-20 object-contain">
                </div>
                <p class="text-[6pt] font-semibold text-white/60 uppercase tracking-widest text-center mt-0.5">Acesse</p>
                <p class="text-[6pt] font-semibold text-white/60 uppercase tracking-widest text-center">Nosso Site</p>
            </div>

        </div>
    </div>

    <!-- Script para preview local das imagens (base64) -->
    <script>
        // Função mágica de Inteligência de Frontend para remover fundo branco via Canvas!
        function removeWhiteBackground(imageSrc, callback) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                // Varrendo todos os pixels da imagem para apagar o fundo branco do JPEG
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i+1];
                    const b = data[i+2];
                    
                    // Verifica se o pixel é muito claro (tons de branco e quinas do JPEG)
                    if (r > 240 && g > 240 && b > 240) {
                        data[i+3] = 0; // Transforma o canal Alpha em 0 (Invisível)
                    } else if (r > 220 && g > 220 && b > 220) {
                        // Suavização para bordas serrilhadas (Anti-aliasing simples)
                        data[i+3] = 120;
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
                callback(canvas.toDataURL('image/png'));
            };
            img.src = imageSrc;
        }

        function previewImage(event, targetId) {
            const input = event.target;
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    
                    // Chama a magia invisível que remove o retângulo branco na hora
                    removeWhiteBackground(e.target.result, function(transparentImageBase64) {
                        // Update principal
                        const targetImg = document.getElementById(targetId);
                        if(targetImg) targetImg.src = transparentImageBase64;
                        
                        // Update secundário (A IA manda para a frente e o verso se houver)
                        if(targetId === 'img-grupo-idea') {
                            const targetImgBack = document.getElementById(targetId + '-back');
                            if(targetImgBack) targetImgBack.src = transparentImageBase64;
                        }
                    });
                    
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Calibradores de Posição Interativos para a Logo Frontal
        const rangePosY = document.getElementById('range-pos-y');
        const rangePosX = document.getElementById('range-pos-x');
        
        function updateLogoPosition() {
            const imgIdea = document.getElementById('img-idea');
            if(imgIdea && rangePosX && rangePosY) {
                imgIdea.style.transform = `translate(${rangePosX.value}px, ${rangePosY.value}px)`;
            }
        }

        if (rangePosY) rangePosY.addEventListener('input', updateLogoPosition);
        if (rangePosX) rangePosX.addEventListener('input', updateLogoPosition);
    </script>
</body>
</html>
